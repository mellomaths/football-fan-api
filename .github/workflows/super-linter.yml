name: Super-Linter

permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: super-linter-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  super-linter:
    name: Lint
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Super-Linter
        uses: super-linter/super-linter/slim@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Diff-only (vs base branch on PRs, vs previous commit on push)
          VALIDATE_ALL_CODEBASE: false
          # Match `.agents/...` at repo root (not only `.../.agents/...`)
          FILTER_REGEX_EXCLUDE: .*(\.agents/|\.cursor/|skills-lock\.json).*
          # Biome still picked up some excluded paths in CI; app code is not Biome-based
          VALIDATE_BIOME_FORMAT: false
          VALIDATE_BIOME_LINT: false
          # Avoid Prettier vs markdownlint fights on long technical lines
          VALIDATE_MARKDOWN_PRETTIER: false
          # Hand-written Postgres migrations; dialect-specific SQL is noisy for sqlfluff without config
          VALIDATE_SQLFLUFF: false
          # Test fixtures intentionally repeat similar HTML/text
          VALIDATE_JSCPD: false
          # No commitlint config in repo
          VALIDATE_GIT_COMMITLINT: false
          # golangci-lint on per-file Go paths fails; module-level lint runs in Go job
          VALIDATE_GO: false
          # Requires pinning every action to SHA; actionlint still validates workflows
          VALIDATE_GITHUB_ACTIONS_ZIZMOR: false
          # Avoid noisy duplicate / conflicting Python tools; Ruff covers style + lint
          VALIDATE_PYTHON_PYLINT: false
          VALIDATE_PYTHON_FLAKE8: false
          VALIDATE_PYTHON_ISORT: false
          VALIDATE_PYTHON_BLACK: false
          VALIDATE_PYTHON_MYPY: false
          # Prose linting is noisy on technical READMEs
          VALIDATE_NATURAL_LANGUAGE: false
